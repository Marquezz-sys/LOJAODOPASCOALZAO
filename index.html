<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOJÃO DO PASCOALZÃO - Catálogo de Arte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #8B1D1D;
            --bg-beige: #F5F1EE;
            --text-dark: #333333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-beige);
            color: var(--text-dark);
        }

        .serif {
            font-family: 'Playfair Display', serif;
        }

        .header-border {
            border-bottom: 1px solid #E0D8D0;
        }

        .filter-sidebar {
            background-color: #EFE9E4;
            height: fit-content;
        }

        .art-card {
            background: transparent;
            transition: transform 0.2s;
        }

        .art-card:hover {
            transform: translateY(-5px);
        }

        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25d366;
            color: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .whatsapp-float:hover {
            background-color: #128C7E;
        }

        input[type="checkbox"] {
            accent-color: var(--primary-red);
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="bg-white header-border sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <!-- Navegação Esquerda -->
            <nav class="hidden md:flex space-x-6 text-xs font-semibold uppercase tracking-widest">
                <a href="#" class="hover:text-red-800">Artistas</a>
                <a href="#" class="hover:text-red-800">Sobre Nós</a>
                <a href="#" class="hover:text-red-800">Contato</a>
            </nav>

            <!-- Logo Central -->
            <div class="text-3xl serif font-bold tracking-tighter text-red-900 text-center uppercase">
                Lojão do Pascoalzão
            </div>

            <!-- Navegação Direita -->
            <div class="flex items-center space-x-6 text-xs font-semibold uppercase tracking-widest">
                <a href="#" class="flex items-center gap-1 hover:text-red-800 text-gray-400 cursor-not-allowed">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    Pesquisar
                </a>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Barra Lateral de Filtros -->
            <aside class="w-full lg:w-64 filter-sidebar p-6 rounded shadow-sm">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-bold uppercase tracking-wider text-red-900">Catálogo</h2>
                </div>

                <div class="mb-6 relative">
                    <input type="text" placeholder="Procurar obra..." class="w-full p-2 pr-10 border border-gray-300 rounded-sm text-sm focus:outline-none">
                    <button class="absolute right-0 top-0 h-full bg-red-800 text-white px-3 text-xs font-bold uppercase">Filtrar</button>
                </div>

                <div class="mb-6 border-b border-gray-300 pb-4">
                    <h3 class="font-bold text-xs uppercase mb-3 text-red-900">Técnica</h3>
                    <div class="space-y-2 text-sm">
                        <label class="flex items-center gap-2 cursor-pointer hover:text-red-800">
                            <input type="checkbox"> Desenho
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer hover:text-red-800">
                            <input type="checkbox"> Fotografia
                        </label>
                    </div>
                </div>

                <div class="text-[10px] text-gray-500 italic">
                    * Preços sob consulta direta via WhatsApp.
                </div>
            </aside>

            <!-- Seção Principal de Obras -->
            <section class="flex-1">
                <div class="flex justify-between items-center mb-6 text-sm text-gray-600">
                    <p>Exibindo <span class="font-bold text-black" id="total-count">0</span> obras exclusivas</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-x-6 gap-y-12" id="grid-obras"></div>
            </section>
        </div>
    </main>

    <!-- Botão Flutuante de WhatsApp -->
    <div class="whatsapp-float" id="whatsapp-direct-btn">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.94 3.659 1.437 5.634 1.437h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
    </div>

    <script>
        const obras = [
            { 
                nome: "ESTADO DE GESTO (53)", 
                artista: "MIRIAN FERNANDES", 
                preco: "R$ 8.000,00", 
                img: "https://artsoul.nyc3.cdn.digitaloceanspaces.com/artworks/20924/XzBoWCZQj1g0wgn6qxWyA129012026122915.webp",
                aspect: "4/3" 
            },
            { nome: "NPT (NE PAS TOUCHER) #2", artista: "ANTONIO WOLFF", preco: "R$ 7.250,00", placeholderColor: "#EAEAEA", aspect: "3/4" },
            { nome: "FENDI E PIPOCA", artista: "JOSÉ GONÇALVES", preco: "R$ 7.800,00", placeholderColor: "#C5D3A3", aspect: "1/1" },
            { nome: "ITELVINO JAHN - ANGICO MACIÇO", artista: "ITELVINO JAHN", preco: "R$ 8.000,00", placeholderColor: "#A67B5B", aspect: "4/5" },
            { nome: "SÉRIE IMPERMANÊNCIA AMARELO", artista: "ARTISTA DESCONHECIDO", preco: "R$ 6.500,00", placeholderColor: "#E3C23E", aspect: "1/1" },
            { nome: "AZUL E MOVIMENTO", artista: "RICARDO CASTRO", preco: "R$ 9.100,00", placeholderColor: "#7499D1", aspect: "1/1" }
        ];

        const WHATSAPP_NUMBER = "5516998592902";

        function renderObras() {
            const grid = document.getElementById('grid-obras');
            document.getElementById('total-count').innerText = obras.length;
            grid.innerHTML = obras.map(obra => `
                <div class="art-card">
                    <div class="image-container mb-4 overflow-hidden bg-white shadow-sm border border-gray-100" style="aspect-ratio: ${obra.aspect};">
                        ${obra.img ? 
                            `<img src="${obra.img}" alt="${obra.nome}" loading="lazy" onerror="this.style.display='none'; this.parentNode.innerHTML='[Erro ao carregar imagem]'">` : 
                            `<div class="w-full h-full flex items-center justify-center text-xs text-gray-400 font-light italic p-4 text-center" style="background-color: ${obra.placeholderColor}22;">
                                [Arte: ${obra.nome}]
                            </div>`
                        }
                    </div>
                    <div class="space-y-1">
                        <h4 class="text-xs font-bold text-red-900 uppercase">${obra.nome}</h4>
                        <p class="text-[10px] text-gray-500 uppercase tracking-wider">${obra.artista}</p>
                        <p class="text-xs font-semibold">${obra.preco}</p>
                        <button onclick="contactSeller('${obra.nome}')" class="mt-2 text-[10px] border border-red-900 text-red-900 px-2 py-1 uppercase hover:bg-red-900 hover:text-white transition-colors">Solicitar Informações</button>
                    </div>
                </div>
            `).join('');
        }

        function contactSeller(obraNome = "") {
            const message = obraNome ? `Olá! Tenho interesse na obra: ${obraNome}.` : ".";
            const url = `https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
        }

        document.getElementById('whatsapp-direct-btn').onclick = () => contactSeller();

        window.onload = renderObras;
    </script>
</body>
</html>
